<!DOCTYPE html>
<html>
<head>
<title>DR. L. TRAINER // LUMINAR OS</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:teal;
  overflow:hidden;
}

/* LOADING SCREEN */
#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:teal;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:9999;
  transition:opacity 1.5s;
}

/* LOGIN */
#login {
  position:absolute;
  width:100%;
  height:100%;
  background:teal;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box {
  width:320px;
  background:#c0c0c0;
  border:2px solid black;
}

.login-title {
  background:navy;
  color:white;
  padding:5px;
}

.login-body { padding:10px; }

input {
  width:95%;
  margin:5px 0;
  padding:5px;
}

/* DESKTOP */
#desktop {
  display:none;
  width:100%;
  height:100%;
  background:teal;
}

/* ICONS */
.icon {
  position:absolute;
  width:90px;
  text-align:center;
  color:white;
  cursor:pointer;
}

.icon span { display:block; font-size:12px; }

.tape { top:80px; left:40px; }
.files { top:160px; left:40px; }
.locked { top:240px; left:40px; }
.aol { top:320px; left:40px; }
.camera { top:400px; left:40px; }
.briefcase { top:480px; left:40px; }

/* WINDOWS */
.window {
  width:420px;
  height:300px;
  background:#c0c0c0;
  border:2px solid black;
  position:absolute;
  top:120px;
  left:200px;
  display:none;
}

.title-bar {
  background:navy;
  color:white;
  padding:5px;
}

.close {
  float:right;
  background:red;
  padding:2px 6px;
  cursor:pointer;
}

.window-content {
  padding:10px;
  font-size:12px;
}

/* TASKBAR */
.taskbar {
  position:fixed;
  bottom:0;
  width:100%;
  height:30px;
  background:#c0c0c0;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.right { margin-right:10px; }

/* AOL */
#aolHome, #aolChat {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  background:teal;
}

.aol-box {
  width:320px;
  background:#c0c0c0;
  border:2px solid black;
  padding:10px;
  margin:80px auto;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">Booting Luminar OS...</div>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-title">Windows 95 Login</div>
    <div class="login-body">
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">OK</button>
      <p id="error"></p>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- ICONS -->
<div class="icon tape" onclick="playClick(); openWin('tapes')">
📼<span>Tapes</span>
</div>

<div class="icon files" onclick="playClick(); openWin('files')">
📁<span>Files</span>
</div>

<div class="icon locked" onclick="playClick(); openWin('locked')">
🔒<span>Locked</span>
</div>
