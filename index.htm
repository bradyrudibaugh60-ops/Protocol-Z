<!DOCTYPE html>
<html>
<head>
<title>Luminar Terminal</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:black;
  overflow:hidden;
}

/* LOADING SCREEN */
#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:lime;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:9999;
  transition:opacity 1.5s;
}

/* LOGIN SCREEN */
#login {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  color:lime;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

input {
  margin:5px;
  padding:5px;
}

/* DESKTOP */
#desktop {
  display:none;
  background:teal;
  width:100%;
  height:100%;
}

/* ICONS */
.icon {
  position:absolute;
  color:white;
  text-align:center;
  cursor:pointer;
}

.icon span {
  display:block;
  font-size:12px;
}

.tape { top:100px; left:40px; }
.files { top:180px; left:40px; }
.locked { top:260px; left:40px; }

/* WINDOWS */
.window {
  width:400px;
  height:300px;
  background:#c0c0c0;
  border:2px solid black;
  position:absolute;
  top:120px;
  left:200px;
  display:none;
}

.title-bar {
  background:navy;
  color:white;
  padding:5px;
}

.close-btn {
  float:right;
  cursor:pointer;
  background:red;
  padding:2px 6px;
}

.window-content {
  padding:10px;
  font-size:12px;
}

/* TASKBAR */
.taskbar {
  position:fixed;
  bottom:0;
  width:100%;
  height:30px;
  background:#c0c0c0;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.clock {
  margin-right:10px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">Booting Luminar OS...</div>

<!-- LOGIN -->
<div id="login">
<h2>ACCESS TERMINAL</h2>
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password" type="password">
<button onclick="login()">ENTER</button>
<p id="error"></p>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon tape" onclick="openWin('tapes')">
📼
<span>Tapes</span>
</div>

<div class="icon files" onclick="openWin('files')">
📁
<span>Files</span>
</div>

<div class="icon locked" onclick="openWin('locked')">
🔒
<span>Locked</span>
</div>

<!-- TAPE WINDOW -->
<div id="tapes" class="window">
<div class="title-bar">Tape Archive
<span class="close-btn" onclick="closeWin('tapes')">X</span>
</div>

<div class="window-content">

<button onclick="playTape('tape1.mp3')">Play Tape 1</button><br>
<button onclick="playTape('tape2.mp3')">Play Tape 2</button><br>

<br>
<audio id="player" controls style="width:100%;"></audio>

</div>
</div>

<!-- FILES -->
<div id="files" class="window">
<div class="title-bar">Files
<span class="close-btn" onclick="closeWin('files')">X</span>
</div>

<div class="window-content">
📄 log1.txt<br>
📄 report_z13.txt<br>
</div>
</div>

<!-- LOCKED SECTION -->
<div id="locked" class="window">
<div class="title-bar">RESTRICTED
<span class="close-btn" onclick="closeWin('locked')">X</span>
</div>

<div class="window-content">
ACCESS DENIED<br>
[LOCKED CONTENT READY]
</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
<div class="clock" id="clock"></div>
</div>

</div>

<script>
/* LOADING */
setTimeout(()=>{
  document.getElementById("loading").style.opacity=0;
  setTimeout(()=>document.getElementById("loading").style.display="none",1500);
},2000);

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="LTrainer_87" && p==="Z13X17"){
    document.getElementById("login").style.display="none";
    document.getElementById("desktop").style.display="block";
  } else {
    document.getElementById("error").innerText="ACCESS DENIED";
  }
}

/* WINDOWS */
function openWin(id){
  document.getElementById(id).style.display="block";
}

function closeWin(id){
  document.getElementById(id).style.display="none";
}

/* AUDIO */
function playTape(src){
  let player=document.getElementById("player");
  player.src=src;
  player.play();
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
