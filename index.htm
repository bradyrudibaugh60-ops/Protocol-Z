<!DOCTYPE html>
<html>
<head>
<title>PROTOCOL Z v3.3</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#007070;
  font-family:"MS Sans Serif", Tahoma, sans-serif;
}

/* BOOT / LOGIN LAYERS */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

#boot1,#boot2{
  background:black;
  color:lime;
  z-index:9999;
  font-family:monospace;
}

#login{
  display:none;
  background:#007070;
  z-index:5000;
}

/* LOGIN BOX */
.box{
  width:320px;
  background:#c0c0c0;
  border:2px solid black;
}

.title{
  background:#000080;
  color:white;
  padding:6px;
}

.body{ padding:10px; }

input{
  width:95%;
  margin:5px 0;
  padding:5px;
}

/* DESKTOP */
#desktop{
  display:none;
  width:100%;
  height:100%;
  background:#007070;
}

/* ICONS */
.icon{
  position:absolute;
  width:110px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

.icon .emoji{ font-size:28px; }
.icon span{ display:block; }

.tapes{top:80px;left:40px;}
.files{top:170px;left:40px;}
.aol{top:260px;left:40px;}
.staff{top:350px;left:40px;}
.notes{top:440px;left:40px;}
.cams{top:530px;left:40px;}
.brief{top:620px;left:40px;}

/* WINDOWS */
.window{
  width:420px;
  height:300px;
  background:#bcbcbc;
  border:2px solid black;
  position:absolute;
  display:none;
}

.bar{
  background:#000080;
  color:white;
  padding:4px;
  cursor:move;
  font-size:12px;
}

.close{
  float:right;
  background:red;
  padding:2px 6px;
  cursor:pointer;
}

.content{ padding:10px; font-size:12px; }

/* TASKBAR */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:28px;
  background:#c0c0c0;
  border-top:2px solid white;
}
</style>
</head>

<body>

<!-- BOOT 1 (FORCED SAFE START) -->
<div id="boot1" class="screen">LUMINAR BIOS CHECK... OK</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="box">
    <div class="title">PROTOCOL Z LOGIN</div>
    <div class="body">
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">ENTER</button>
      <p id="msg"></p>
    </div>
  </div>
</div>

<!-- BOOT 2 -->
<div id="boot2" class="screen" style="display:none;">
SYSTEM VERIFYING...
</div>

<!-- DESKTOP -->
<div id="desktop">

  <div class="icon tapes" onclick="openW('tapes')"><div class="emoji">📼</div><span>Tapes</span></div>
  <div class="icon files" onclick="openW('files')"><div class="emoji">📁</div><span>Files</span></div>
  <div class="icon aol" onclick="openW('aol')"><div class="emoji">💬</div><span>AOL</span></div>
  <div class="icon staff" onclick="openW('staff')"><div class="emoji">🧪</div><span>Staff</span></div>
  <div class="icon notes" onclick="openW('notes')"><div class="emoji">📝</div><span>Notes</span></div>
  <div class="icon cams" onclick="openW('cams')"><div class="emoji">📹</div><span>Cams</span></div>
  <div class="icon brief" onclick="openW('brief')"><div class="emoji">🔒</div><span>Brief</span></div>

  <!-- WINDOWS -->
  <div id="tapes" class="window"><div class="bar">Tapes <span class="close" onclick="closeW('tapes')">X</span></div><div class="content">Tape System</div></div>

  <div id="files" class="window"><div class="bar">Files <span class="close" onclick="closeW('files')">X</span></div><div class="content">Files</div></div>

  <div id="notes" class="window"><div class="bar">Notes <span class="close" onclick="closeW('notes')">X</span></div><div class="content">Trainer notes: Z-13 unstable</div></div>

  <div id="cams" class="window"><div class="bar">Cameras <span class="close" onclick="closeW('cams')">X</span></div><div class="content">Feeds unstable</div></div>

  <div id="brief" class="window"><div class="bar">Brief <span class="close" onclick="closeW('brief')">X</span></div><div class="content">LOCKED</div></div>

  <!-- AOL -->
  <div id="aol" class="window"><div class="bar">AOL <span class="close" onclick="closeW('aol')">X</span></div><div class="content">Mail / News / Ads system</div></div>

  <!-- STAFF SYSTEM -->
  <div id="staff" class="window">

    <div class="bar">Staff <span class="close" onclick="closeW('staff')">X</span></div>

    <div class="content">

      <div id="staffLoginBox">
        <input id="suser" placeholder="User">
        <input id="spass" type="password" placeholder="Pass">
        <button onclick="staffLogin()">Login</button>
        <p id="smsg"></p>
      </div>

      <div id="labHome" style="display:none;">
        <b>LAB HOME</b><br><br>
        <button onclick="alert('LOCKED')">Z-13 Wing</button><br><br>
        <button onclick="alert('LOCKED')">Simulation</button><br><br>
        <button onclick="logoutStaff()">Logout</button>
      </div>

    </div>

  </div>

</div>

<script>

/* =========================
   🔥 SAFE BOOT SYSTEM (NO FREEZE EVER)
========================= */

(function bootFix(){

  // FORCE RESET EVERYTHING FIRST
  document.getElementById("boot1").style.display="flex";
  document.getElementById("login").style.display="none";
  document.getElementById("desktop").style.display="none";
  document.getElementById("boot2").style.display="none";

  // STEP 1 -> BOOT SCREEN
  setTimeout(function(){
    document.getElementById("boot1").style.display="none";
    document.getElementById("login").style.display="flex";
  },1400);

})();

/* LOGIN */
function login(){

  var u=document.getElementById("user").value;
  var p=document.getElementById("pass").value;

  if(u==="LTrainer_87" && p==="Z13X17"){

    document.getElementById("login").style.display="none";
    document.getElementById("boot2").style.display="flex";

    setTimeout(function(){
      document.getElementById("boot2").style.display="none";
      document.getElementById("desktop").style.display="block";
    },1400);

  } else {
    document.getElementById("msg").innerText="DENIED";
  }
}

/* WINDOWS */
function openW(id){
  document.getElementById(id).style.display="block";
}

function closeW(id){
  document.getElementById(id).style.display="none";
}

/* STAFF SYSTEM */
function staffLogin(){

  var u=document.getElementById("suser").value;
  var p=document.getElementById("spass").value;

  if(u==="LeeTrainer" && p==="Z13X17"){
    document.getElementById("smsg").innerText="ACCESS GRANTED";

    setTimeout(function(){
      document.getElementById("staffLoginBox").style.display="none";
      document.getElementById("labHome").style.display="block";
    },300);

  } else {
    document.getElementById("smsg").innerText="DENIED";
  }
}

function logoutStaff(){
  document.getElementById("labHome").style.display="none";
  document.getElementById("staffLoginBox").style.display="block";
}

</script>

</body>
</html>
