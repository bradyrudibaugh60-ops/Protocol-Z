<!DOCTYPE html>
<html>
<head>
<title>TRAINER PERSONAL SYSTEM // PROTOCOL Z</title>

<style>
body{
margin:0;
background:#008080;
font-family:"MS Sans Serif";
overflow:hidden;
}

/* =========================
   BOOT SCREENS (WIN95 STYLE)
========================= */

.screen{
position:fixed;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
}

#bios{
background:black;
color:lime;
font-family:monospace;
font-size:14px;
display:flex;
flex-direction:column;
}

#winboot{
background:#000080;
color:white;
font-family:"MS Sans Serif";
flex-direction:column;
text-align:center;
}

#loading{
background:#c0c0c0;
flex-direction:column;
}

.bar{
width:300px;
height:18px;
border:2px inset #fff;
background:#999;
margin-top:10px;
position:relative;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#000080;
animation:load 2.5s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

/* =========================
   LOGIN (WIN95 STYLE)
========================= */

#login{
display:none;
background:#008080;
align-items:center;
justify-content:center;
}

.loginBox{
width:340px;
background:#c0c0c0;
border:2px solid black;
box-shadow:4px 4px black;
}

.title{
background:#000080;
color:white;
padding:6px;
font-size:13px;
}

.body{
padding:15px;
text-align:center;
}

input{
width:90%;
margin:4px 0;
padding:4px;
border:2px inset #fff;
background:white;
font-family:"MS Sans Serif";
}

button{
margin-top:8px;
padding:4px 10px;
border:2px outset #fff;
background:#c0c0c0;
cursor:pointer;
}

/* DESKTOP */
#desktop{
display:none;
width:100%;
height:100%;
background:#008080;
}
</style>
</head>

<body>

<!-- =========================
     BIOS SCREEN
========================= -->
<div id="bios" class="screen">
<pre>
TRAINER PERSONAL BIOS v3.7
--------------------------
Checking RAM........ OK
Checking CPU........ OK
Loading Kernel...... OK
Starting SYSTEM.....
</pre>
</div>

<!-- =========================
     WINDOWS 95 SPLASH
========================= -->
<div id="winboot" class="screen">
<h2>Microsoft Windows 95</h2>
<p>Starting system...</p>
</div>

<!-- =========================
     LOADING SCREEN
========================= -->
<div id="loading" class="screen">
<h3>Loading Trainer Personal Environment</h3>
<div class="bar"><div class="fill"></div></div>
</div>

<!-- =========================
     LOGIN SCREEN
========================= -->
<div id="login" class="screen">

<div class="loginBox">

<div class="title">Windows 95 - Personal Logon</div>

<div class="body">

<div style="font-size:40px;">🪟</div>

<input id="user" placeholder="Username" disabled><br>
<input id="pass" type="password" placeholder="Password" disabled><br>

<button id="loginBtn" onclick="login()" disabled>OK</button>

<p id="msg"></p>

</div>
</div>

</div>

<!-- =========================
     DESKTOP (PLACEHOLDER)
========================= -->
<div id="desktop">

<h3 style="color:white;padding:20px;">TRAINER PERSONAL DESKTOP LOADED</h3>

</div>

<script>

/* =========================
   SAFE INIT PIPELINE
========================= */

window.addEventListener("load", () => {

  const bios = document.getElementById("bios");
  const winboot = document.getElementById("winboot");
  const loading = document.getElementById("loading");
  const login = document.getElementById("login");
  const desktop = document.getElementById("desktop");

  // RESET ALL STATES
  bios.style.display = "flex";
  winboot.style.display = "none";
  loading.style.display = "none";
  login.style.display = "none";
  desktop.style.display = "none";

  /* =========================
     BOOT SEQUENCE FLOW
  ========================= */

  setTimeout(() => {
    bios.style.display = "none";
    winboot.style.display = "flex";
  }, 2000);

  setTimeout(() => {
    winboot.style.display = "none";
    loading.style.display = "flex";
  }, 4200);

  setTimeout(() => {
    loading.style.display = "none";
    login.style.display = "flex";

    enableLogin();

  }, 7000);

});

/* =========================
   ENABLE LOGIN INPUTS
========================= */

function enableLogin(){

  const user = document.getElementById("user");
  const pass = document.getElementById("pass");
  const btn = document.getElementById("loginBtn");

  user.disabled = false;
  pass.disabled = false;
  btn.disabled = false;
}

/* =========================
   LOGIN SYSTEM
========================= */

function login(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const login = document.getElementById("login");
  const desktop = document.getElementById("desktop");
  const msg = document.getElementById("msg");

  if(user === "LTrainer_87" && pass === "Z13X17"){

    login.style.display = "none";
    desktop.style.display = "block";

  } else {
    msg.innerText = "ACCESS DENIED";
  }
}

</script>

</body>
</html>
