<!DOCTYPE html>
<html>
<head>
<title>PROTOCOL Z v3.4.1</title>

<style>
body{
  margin:0;
  background:#007070;
  font-family:"MS Sans Serif", Tahoma;
  overflow:hidden;
}

/* SCREENS */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:monospace;
}

#boot1,#boot2{
  background:black;
  color:lime;
  z-index:9999;
}

#login{
  display:none;
  background:#007070;
  z-index:9000;
}

/* DESKTOP */
#desktop{
  display:none;
  width:100%;
  height:100%;
}

/* ICONS */
.icon{
  position:absolute;
  width:110px;
  text-align:center;
  cursor:pointer;
}
.icon .emoji{font-size:30px;}
.icon span{display:block;font-size:12px;}

.youtube{top:80px;left:40px;}
.cams{top:160px;left:40px;}
.aol{top:240px;left:40px;}
.staff{top:320px;left:40px;}
.notes{top:400px;left:40px;}
.files{top:480px;left:40px;}
.tapes{top:560px;left:40px;}

/* WINDOWS */
.window{
  width:460px;
  height:330px;
  background:#c0c0c0;
  border:2px solid black;
  position:absolute;
  display:none;
}

.bar{
  background:#000080;
  color:white;
  padding:4px;
}

.close{
  float:right;
  background:red;
  padding:2px 6px;
  cursor:pointer;
}

.content{padding:10px;font-size:12px;}

/* TASKBAR (INSIDE DESKTOP ONLY) */
.taskbar{
  position:absolute;
  bottom:0;
  width:100%;
  height:28px;
  background:#c0c0c0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-top:2px solid white;
}
</style>
</head>

<body>

<!-- BOOT 1 -->
<div id="boot1" class="screen">LUMINAR BIOS CHECK... OK</div>

<!-- LOGIN -->
<div id="login" class="screen">
<div>
<input id="user" placeholder="User"><br>
<input id="pass" type="password" placeholder="Pass"><br>
<button onclick="login()">ENTER</button>
<p id="msg"></p>
</div>
</div>

<!-- BOOT 2 -->
<div id="boot2" class="screen" style="display:none;">VERIFYING SYSTEM...</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- ICONS -->
<div class="icon youtube" onclick="openW('yt')"><div class="emoji">▶</div><span>YouTube</span></div>
<div class="icon cams" onclick="openW('cams')"><div class="emoji">📹</div><span>Cameras</span></div>
<div class="icon aol" onclick="openW('aol')"><div class="emoji">💬</div><span>AOL</span></div>
<div class="icon staff" onclick="openW('staff')"><div class="emoji">🧪</div><span>Staff</span></div>
<div class="icon notes" onclick="openW('notes')"><div class="emoji">📝</div><span>Notes</span></div>
<div class="icon files" onclick="openW('files')"><div class="emoji">📁</div><span>Files</span></div>
<div class="icon tapes" onclick="openW('tapes')"><div class="emoji">📼</div><span>Tapes</span></div>

<!-- WINDOWS -->
<div id="yt" class="window">
<div class="bar">YouTube <span class="close" onclick="closeW('yt')">X</span></div>
<div class="content">
<input id="yturl" placeholder="YouTube URL">
<button onclick="loadYT()">Load</button>
<div id="ytframe"></div>
</div>
</div>

<div id="cams" class="window">
<div class="bar">Cameras <span class="close" onclick="closeW('cams')">X</span></div>
<div class="content">
<input id="camurl" placeholder="Feed URL">
<button onclick="loadCam()">Connect</button>
<div id="camview"></div>
</div>
</div>

<div id="aol" class="window">
<div class="bar">AOL 1997 <span class="close" onclick="closeW('aol')">X</span></div>
<div class="content">
<button onclick="switchTab('chat')">Chat</button>
<button onclick="switchTab('mail')">Mail</button>
<button onclick="switchTab('news')">News</button>

<div id="chat">
<div id="chatlog" style="height:120px;overflow:auto;border:1px solid black;"></div>
<input id="chatInput">
<button onclick="sendChat()">Send</button>
</div>

<div id="mail" style="display:none;">You’ve Got Mail: 0</div>
<div id="news" style="display:none;">Luminar instability rising...</div>
</div>
</div>

<div id="notes" class="window">
<div class="bar">Notes <span class="close" onclick="closeW('notes')">X</span></div>
<div class="content" id="notesContent">- Z-13 unstable</div>
</div>

<div id="files" class="window">
<div class="bar">Files <span class="close" onclick="closeW('files')">X</span></div>
<div class="content" id="filesContent">log.txt</div>
</div>

<div id="tapes" class="window">
<div class="bar">Tapes <span class="close" onclick="closeW('tapes')">X</span></div>
<div class="content" id="tapesContent">Tape 1 Available</div>
</div>

<div id="staff" class="window">
<div class="bar">Staff <span class="close" onclick="closeW('staff')">X</span></div>
<div class="content">
<input id="suser" placeholder="User">
<input id="spass" placeholder="Pass">
<button onclick="staffLogin()">Login</button>
<p id="smsg"></p>
</div>
</div>

<!-- TASKBAR (FIXED LOCATION) -->
<div class="taskbar">
<div>
<button onclick="alert('Settings')">⚙</button>
<button onclick="alert('Volume')">🔊</button>
</div>
<div>
<span>🌤 72°F</span> |
<span id="clock"></span>
</div>
</div>

</div>

<script>

/* HARD RESET BOOT SYSTEM */
window.onload=function(){

document.getElementById("boot1").style.display="flex";
document.getElementById("login").style.display="none";
document.getElementById("boot2").style.display="none";
document.getElementById("desktop").style.display="none";

setTimeout(function(){
document.getElementById("boot1").style.display="none";
document.getElementById("login").style.display="flex";
},1500);

};

/* LOGIN */
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="LTrainer_87" && p==="Z13X17"){

document.getElementById("login").style.display="none";
document.getElementById("boot2").style.display="flex";

setTimeout(function(){
document.getElementById("boot2").style.display="none";
document.getElementById("desktop").style.display="block";
},1500);

}else{
document.getElementById("msg").innerText="DENIED";
}
}

/* WINDOWS */
function openW(id){document.getElementById(id).style.display="block";}
function closeW(id){document.getElementById(id).style.display="none";}

/* YOUTUBE */
function loadYT(){
let url=document.getElementById("yturl").value;
document.getElementById("ytframe").innerHTML =
'<iframe width="400" height="200" src="'+url.replace("watch?v=","embed/")+'"></iframe>';
}

/* CAMERA */
function loadCam(){
let url=document.getElementById("camurl").value;
document.getElementById("camview").innerHTML =
'<iframe width="400" height="200" src="'+url+'"></iframe>';
}

/* AOL */
function switchTab(t){
document.getElementById("chat").style.display="none";
document.getElementById("mail").style.display="none";
document.getElementById("news").style.display="none";
document.getElementById(t).style.display="block";
}

/* CHAT */
function sendChat(){
let input=document.getElementById("chatInput").value.toLowerCase();
let log=document.getElementById("chatlog");

log.innerHTML+="<div>You: "+input+"</div>";

let r="...";

if(input.includes("z13")) r="Kane: It's unstable.";
if(input.includes("octogal")) r="Octogal: I see you.";
if(input.includes("tape")) r="Kane: Check archive.";

log.innerHTML+="<div>"+r+"</div>";
document.getElementById("chatInput").value="";
}

/* CLOCK */
setInterval(function(){
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
