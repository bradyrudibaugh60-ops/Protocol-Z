<!DOCTYPE html>
<html>
<head>
<title>TRAINER PERSONAL SYSTEM // PROTOCOL Z v3.7</title>

<style>
body{
margin:0;
font-family:"MS Sans Serif";
overflow:hidden;
background:#008080;
background-image:url("https://i.imgur.com/7vQZ0ZL.png");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.05);
pointer-events:none;
}

/* BOOT */
.screen{
position:fixed;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
font-family:monospace;
}

#bios{background:black;color:lime;display:flex;flex-direction:column;}
#winboot{background:#000080;color:white;flex-direction:column;}
#loading{background:#c0c0c0;flex-direction:column;}

/* BAR */
.bar{
width:300px;
height:18px;
border:2px inset #fff;
background:#999;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
background:#000080;
animation:load 2.5s linear forwards;
}

@keyframes load{from{width:0;}to{width:100%;}}

/* LOGIN */
#login{
display:none;
align-items:center;
justify-content:center;
background:#008080;
}

.loginBox{
width:340px;
background:#c0c0c0;
border:2px solid black;
box-shadow:4px 4px black;
}

.title{
background:#000080;
color:white;
padding:6px;
font-size:13px;
}

.body{
padding:15px;
text-align:center;
}

input{
width:90%;
margin:4px 0;
padding:4px;
border:2px inset #fff;
font-family:"MS Sans Serif";
}

button{
margin-top:8px;
padding:4px 10px;
border:2px outset #fff;
background:#c0c0c0;
cursor:pointer;
}

/* DESKTOP */
#desktop{
display:none;
width:100%;
height:100%;
}
</style>
</head>

<body>

<!-- BIOS -->
<div id="bios" class="screen">
<pre>
TRAINER PERSONAL BIOS v3.7
CPU OK
RAM OK
Z13 CORE OK
BOOT INIT
</pre>
</div>

<!-- WIN BOOT -->
<div id="winboot" class="screen">
<h2>Microsoft Windows 95</h2>
<p>Starting system...</p>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
<h3>Loading Trainer System</h3>
<div class="bar"><div class="fill"></div></div>
</div>

<!-- LOGIN -->
<div id="login" class="screen">

<div class="loginBox">
<div class="title">Windows 95 - Personal Logon</div>

<div class="body">

<div style="font-size:40px;">🪟</div>

<input id="user" placeholder="Username" disabled><br>
<input id="pass" type="password" placeholder="Password" disabled><br>

<button id="loginBtn" onclick="login()" disabled>OK</button>

<p id="msg"></p>

</div>
</div>

</div>

<!-- DESKTOP -->
<div id="desktop">
<h3 style="color:white;padding:20px;">DESKTOP LOADED</h3>
</div>

<script>

/* ================= SAFE BOOT ================= */

window.addEventListener("load", () => {

  const bios = document.getElementById("bios");
  const win = document.getElementById("winboot");
  const load = document.getElementById("loading");
  const login = document.getElementById("login");

  bios.style.display = "flex";

  setTimeout(() => {
    bios.style.display = "none";
    win.style.display = "flex";
  }, 2000);

  setTimeout(() => {
    win.style.display = "none";
    load.style.display = "flex";
  }, 4000);

  setTimeout(() => {
    load.style.display = "none";
    login.style.display = "flex";

    enableLogin(); // SAFE CALL

  }, 6500);

});

/* ================= FIXED LOGIN ENABLE ================= */

function enableLogin(){

  const user = document.getElementById("user");
  const pass = document.getElementById("pass");
  const btn = document.getElementById("loginBtn");

  if(!user || !pass || !btn){
    console.error("LOGIN ELEMENTS MISSING");
    return;
  }

  user.disabled = false;
  pass.disabled = false;
  btn.disabled = false;
}

/* ================= FIXED LOGIN (NO FREEZE) ================= */

function login(){

  const userEl = document.getElementById("user");
  const passEl = document.getElementById("pass");
  const msg = document.getElementById("msg");

  const loginScreen = document.getElementById("login");
  const desktop = document.getElementById("desktop");

  if(!userEl || !passEl){
    console.error("LOGIN INPUTS NOT FOUND");
    return;
  }

  const u = userEl.value.trim();
  const p = passEl.value.trim();

  if(u === "LTrainer_87" && p === "Z13X17"){

    msg.innerText = "";

    loginScreen.style.display = "none";
    desktop.style.display = "block";

  } else {

    msg.innerText = "ACCESS DENIED";

    passEl.value = "";
    passEl.focus();
  }
}

</script>

</body>
</html>
