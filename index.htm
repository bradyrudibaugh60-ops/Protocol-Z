<!DOCTYPE html>
<html>
<head>
<title>PROTOCOL Z // LUMINAR SYSTEM v2</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#007070;
  overflow:hidden;
  color:#000;
}

/* BOOT */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:monospace;
  z-index:9999;
}

#boot1,#boot2{
  background:#000;
  color:lime;
}

/* LOGIN */
#login{
  display:none;
  width:100%;
  height:100%;
  align-items:center;
  justify-content:center;
}

.box{
  width:320px;
  background:#c0c0c0;
  border:2px solid #000;
}

.title{
  background:#000080;
  color:#fff;
  padding:6px;
}

.body{ padding:10px; }

input{
  width:95%;
  margin:5px 0;
  padding:5px;
}

/* DESKTOP */
#desktop{
  display:none;
  width:100%;
  height:100%;
}

/* ICONS */
.icon{
  position:absolute;
  width:80px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

.icon span{ display:block; }

.tapes{top:80px;left:40px;}
.files{top:160px;left:40px;}
.aol{top:240px;left:40px;}

/* WINDOW */
.window{
  width:400px;
  height:280px;
  background:#bcbcbc;
  border:2px solid #000;
  position:absolute;
  top:120px;
  left:200px;
  display:none;
  z-index:10;
}

.bar{
  background:#000080;
  color:#fff;
  padding:4px;
  font-size:12px;
}

.close{
  float:right;
  cursor:pointer;
  background:red;
  padding:2px 6px;
}

.content{ padding:10px; font-size:12px; }

/* TASKBAR */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:28px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

</style>
</head>

<body>

<!-- BOOT 1 -->
<div id="boot1" class="screen">LUMINAR BIOS CHECK... OK</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="box">
    <div class="title">PROTOCOL Z LOGIN</div>
    <div class="body">
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">ENTER</button>
      <p id="msg"></p>
    </div>
  </div>
</div>

<!-- BOOT 2 -->
<div id="boot2" class="screen" style="display:none;">
SYSTEM VERIFYING... Z-13 OK
</div>

<!-- DESKTOP -->
<div id="desktop">

  <div class="icon tapes" onclick="openWin('tapes')">📼<span>Tapes</span></div>
  <div class="icon files" onclick="openWin('files')">📁<span>Files</span></div>
  <div class="icon aol" onclick="openWin('aol')">💬<span>AOL</span></div>

  <!-- TAPES -->
  <div id="tapes" class="window">
    <div class="bar">Tape Archive <span class="close" onclick="closeWin('tapes')">X</span></div>
    <div class="content">
      <button onclick="setTape('TAPE 1: ENTRY')">Tape 1</button>
      <button onclick="setTape('TAPE 2: TEST')">Tape 2</button>
      <button onclick="setTape('TAPE 3: CORRUPTION')">Tape 3</button>
      <p id="tapeOut">No tape loaded</p>
    </div>
  </div>

  <!-- FILES -->
  <div id="files" class="window">
    <div class="bar">Files <span class="close" onclick="closeWin('files')">X</span></div>
    <div class="content">
      trainer_notes.txt<br>
      z13_log.sys<br>
      subject_data.dat
    </div>
  </div>

  <!-- AOL -->
  <div id="aol" class="window">
    <div class="bar">AOL CHAT <span class="close" onclick="closeWin('aol')">X</span></div>
    <div class="content">
      <p><b>Trainer:</b> System unstable.</p>
      <p><b>Kane:</b> Confirmed.</p>
      <p><b>Octogal:</b> It’s inside.</p>
    </div>
  </div>

</div>

<!-- TASKBAR -->
<div class="taskbar">
  <span id="clock"></span>
</div>

<!-- ================= SOUND SYSTEM ================= -->
<audio id="bootSfx" src="boot.mp3"></audio>
<audio id="clickSfx" src="click.mp3"></audio>
<audio id="loginSfx" src="login.mp3"></audio>

<script>

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

/* BOOT FLOW */
setTimeout(()=>{
  document.getElementById("boot1").style.display="none";
  document.getElementById("login").style.display="flex";
},2000);

/* LOGIN */
function login(){
  const u = user.value;
  const p = pass.value;

  if(u==="LTrainer_87" && p==="Z13X17"){
    play("loginSfx");

    login.style.display="none";
    boot2.style.display="flex";

    setTimeout(()=>{
      boot2.style.display="none";
      desktop.style.display="block";
    },2000);

  } else {
    msg.innerText="ACCESS DENIED";
  }
}

/* WINDOWS */
function openWin(id){
  play("clickSfx");
  document.getElementById(id).style.display="block";
}

function closeWin(id){
  document.getElementById(id).style.display="none";
}

/* TAPES */
function setTape(t){
  document.getElementById("tapeOut").innerText = t;
}

/* SOUND ENGINE */
function play(id){
  const a = document.getElementById(id);
  if(!a) return;
  a.currentTime = 0;
  a.play().catch(()=>{});
}

</script>

</body>
</html>
