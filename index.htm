<!DOCTYPE html>
<html>
<head>
<title>PROTOCOL Z v3.4.3</title>

<style>
body{
  margin:0;
  background:#007070;
  font-family:"MS Sans Serif", Tahoma;
  overflow:hidden;
}

/* SCREENS */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:monospace;
}

#boot1,#boot2{
  background:black;
  color:lime;
  z-index:9999;
}

#login{
  display:none;
  background:#007070;
  z-index:9000;
}

/* DESKTOP */
#desktop{
  display:none;
  width:100%;
  height:100%;
}

/* ICONS */
.icon{
  position:absolute;
  width:110px;
  text-align:center;
  cursor:pointer;
}
.icon .emoji{font-size:30px;}
.icon span{display:block;font-size:12px;}

.tapes{top:80px;left:40px;}
.cams{top:160px;left:40px;}

/* WINDOWS */
.window{
  width:460px;
  height:340px;
  background:#c0c0c0;
  border:2px solid black;
  position:absolute;
  display:none;
}

.bar{
  background:#000080;
  color:white;
  padding:4px;
}

.close{
  float:right;
  background:red;
  padding:2px 6px;
  cursor:pointer;
}

.content{padding:10px;font-size:12px;}

/* TASKBAR */
.taskbar{
  position:absolute;
  bottom:0;
  width:100%;
  height:28px;
  background:#c0c0c0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-top:2px solid white;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot1" class="screen">LUMINAR BIOS CHECK... OK</div>

<!-- LOGIN -->
<div id="login" class="screen">
<div>
<input id="user" placeholder="User"><br>
<input id="pass" type="password" placeholder="Pass"><br>
<button onclick="login()">ENTER</button>
<p id="msg"></p>
</div>
</div>

<!-- BOOT 2 -->
<div id="boot2" class="screen" style="display:none;">VERIFYING SYSTEM...</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- ICONS -->
<div class="icon tapes" onclick="openW('tapes')">
<div class="emoji">📼</div><span>Tapes</span>
</div>

<div class="icon cams" onclick="openW('cams')">
<div class="emoji">📹</div><span>Cameras</span>
</div>

<!-- =========================
     📼 TAPES (4 TAPES SYSTEM)
========================= -->
<div id="tapes" class="window">
<div class="bar">Tape Archive <span class="close" onclick="closeW('tapes')">X</span></div>

<div class="content">

<button onclick="playTape('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">
Tape 1: Entry Log
</button><br><br>

<button onclick="playTape('https://www.youtube.com/watch?v=ysz5S6PUM-U')">
Tape 2: Subject Test
</button><br><br>

<button onclick="playTape('https://www.youtube.com/watch?v=aqz-KE-bpKQ')">
Tape 3: Containment Failure
</button><br><br>

<button onclick="playTape('https://www.youtube.com/watch?v=ScMzIvxBSi4')">
Tape 4: Facility Breach
</button><br><br>

<div id="tapePlayer">No tape loaded.</div>

</div>
</div>

<!-- =========================
     📹 CAMERAS
========================= -->
<div id="cams" class="window">
<div class="bar">Security Cameras <span class="close" onclick="closeW('cams')">X</span></div>

<div class="content">

<button onclick="playCam('https://www.youtube.com/watch?v=21X5lGlDOfg')">
Camera 01 - Hallway
</button><br><br>

<button onclick="playCam('https://www.youtube.com/watch?v=hHW1oY26kxQ')">
Camera 02 - Lab
</button><br><br>

<div id="camPlayer">No feed active.</div>

</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
<div>
<button onclick="alert('Settings')">⚙</button>
<button onclick="alert('Volume')">🔊</button>
</div>
<div>
<span>🌤 72°F</span> |
<span id="clock"></span>
</div>
</div>

</div>

<script>

/* =========================
   🔥 SAFE BOOT SYSTEM
========================= */
window.onload=function(){

document.getElementById("boot1").style.display="flex";
document.getElementById("login").style.display="none";
document.getElementById("boot2").style.display="none";
document.getElementById("desktop").style.display="none";

setTimeout(function(){
document.getElementById("boot1").style.display="none";
document.getElementById("login").style.display="flex";
},1500);

};

/* LOGIN */
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="LTrainer_87" && p==="Z13X17"){

document.getElementById("login").style.display="none";
document.getElementById("boot2").style.display="flex";

setTimeout(function(){
document.getElementById("boot2").style.display="none";
document.getElementById("desktop").style.display="block";
},1500);

}else{
document.getElementById("msg").innerText="DENIED";
}
}

/* WINDOWS */
function openW(id){document.getElementById(id).style.display="block";}
function closeW(id){document.getElementById(id).style.display="none";}

/* =========================
   🎞 VIDEO SYSTEM
========================= */

/* convert youtube link */
function convertYT(url){
if(url.includes("watch?v=")){
return url.replace("watch?v=","embed/");
}
return url;
}

/* play tape */
function playTape(url){
let embed = convertYT(url);

document.getElementById("tapePlayer").innerHTML =
'<iframe width="100%" height="220" src="'+embed+'" frameborder="0" allowfullscreen></iframe>';
}

/* play camera */
function playCam(url){
let embed = convertYT(url);

document.getElementById("camPlayer").innerHTML =
'<iframe width="100%" height="220" src="'+embed+'" frameborder="0" allowfullscreen></iframe>';
}

/* CLOCK */
setInterval(function(){
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
