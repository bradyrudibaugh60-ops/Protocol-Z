<!-- Protocol Z v3.3 FULL WINDOWS 95 OVERHAUL -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protocol Z v3.3</title>
<style>
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#008080;
  overflow:hidden;
}

/* DESKTOP */
#desktop{
  width:100vw;
  height:100vh;
  position:relative;
  background:#008080;
}

/* APP GRID (1x6) */
#appGrid{
  display:grid;
  grid-template-columns: repeat(6, 120px);
  gap:15px;
  padding:20px;
}
.app{
  width:100px;
  height:100px;
  background:#c0c0c0;
  border:2px outset #fff;
  text-align:center;
  padding:10px;
  cursor:pointer;
}
.app:active{
  border:2px inset #000;
}

/* WINDOW STYLE */
.window{
  position:absolute;
  top:50px;
  left:50px;
  width:500px;
  height:400px;
  background:#c0c0c0;
  border:2px outset #fff;
  display:none;
  flex-direction:column;
}
.titlebar{
  background:navy;
  color:white;
  padding:5px;
  display:flex;
  justify-content:space-between;
}
.content{
  padding:10px;
  overflow:auto;
  flex:1;
}

/* TASKBAR */
#taskbar{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:40px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
}

button{
  background:#c0c0c0;
  border:2px outset #fff;
  cursor:pointer;
}
button:active{ border:2px inset #000; }

/* LOGIN */
#login{
  position:absolute;
  width:100vw;
  height:100vh;
  background:#000;
  color:#0f0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>LUMINAR ACCESS TERMINAL</h2>
  <input id="user" placeholder="User"><br><br>
  <input id="pass" type="password" placeholder="Pass"><br><br>
  <button onclick="login()">ENTER</button>
</div>

<!-- DESKTOP -->
<div id="desktop" style="display:none">

  <!-- APP GRID -->
  <div id="appGrid">
    <div class="app" onclick="openWin('tapesWin')">Tapes</div>
    <div class="app" onclick="openWin('newsWin')">News</div>
    <div class="app" onclick="openWin('securityWin')">Security</div>
    <div class="app" onclick="openWin('staffWin')">Staff Directory</div>
  </div>

  <!-- TAPES WINDOW -->
  <div class="window" id="tapesWin">
    <div class="titlebar">Tapes <button onclick="closeWin('tapesWin')">X</button></div>
    <div class="content">
      <button onclick="playTape(1)">Tape 1</button>
      <button onclick="playTape(4)">Tape 4</button>
      <div id="tapeOut"></div>
    </div>
  </div>

  <!-- NEWS WINDOW -->
  <div class="window" id="newsWin">
    <div class="titlebar">Luminar News <button onclick="closeWin('newsWin')">X</button></div>
    <div class="content" id="newsContent"></div>
  </div>

  <!-- SECURITY WINDOW -->
  <div class="window" id="securityWin">
    <div class="titlebar">Security Footage <button onclick="closeWin('securityWin')">X</button></div>
    <div class="content">
      <button onclick="feed(1)">Feed 1 Exterior</button>
      <button onclick="feed(2)">Feed 2 Hallway</button>
      <button onclick="feed(3)">Feed 3 Daniel Reyes</button>
      <button onclick="feed(4)">Feed 4 Sublevel 4</button>
      <div id="feedOut"></div>
    </div>
  </div>

  <!-- STAFF DIRECTORY -->
  <div class="window" id="staffWin">
    <div class="titlebar">Staff Directory <button onclick="closeWin('staffWin')">X</button></div>
    <div class="content">
      <input id="staffUser" placeholder="User"><br>
      <input id="staffPass" type="password" placeholder="Pass"><br>
      <button onclick="staffLogin()">Login</button>
      <div id="staffHub"></div>
    </div>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <button onclick="startMenu()">Start</button>
    <div>
      Volume | Brightness | Settings | Weather: OK | Clock: <span id="clock"></span>
    </div>
  </div>

</div>

<script>
function login(){
  if(document.getElementById('user').value && document.getElementById('pass').value){
    document.getElementById('login').style.display='none';
    document.getElementById('desktop').style.display='block';
    loadNews();
    setInterval(clock,1000);
  }
}

function openWin(id){
  document.getElementById(id).style.display='flex';
}
function closeWin(id){
  document.getElementById(id).style.display='none';
}

// TAPES (INTERNAL YOUTUBE-LIKE SYSTEM)
function playTape(n){
  let out=document.getElementById('tapeOut');
  if(n===1){
    out.innerHTML="[Tape 1]\nSystem initialization of Luminar begins...";
  }
  if(n===4){
    out.innerHTML="[Tape 4 - AOL NODE]\nTrainer: 'We are inside the network.'<br>Kane: 'Signal locked.'<br>Octogal: 'Entity presence detected.'";
  }
}

// NEWS ABOUT LUMINAR
function loadNews(){
  document.getElementById('newsContent').innerHTML=`
  <h3>Luminar System Bulletin</h3>
  <p>- Z-13 Compound instability increasing</p>
  <p>- Director override protocols tested successfully</p>
  <p>- Unknown entity detected in Sublevel 4 corridor</p>
  `;
}

// SECURITY FEEDS (INTERNAL LINK SYSTEM)
function feed(n){
  let out=document.getElementById('feedOut');
  let feeds={
    1:'Exterior Feed: Clear skies, perimeter stable',
    2:'Main Hallway: flickering lights detected',
    3:'Daniel Reyes Room: static interference present',
    4:'SUBLEVEL 4: motion detected near corridor end'
  };
  out.innerHTML=feeds[n];
}

// STAFF LOGIN
function staffLogin(){
  let u=document.getElementById('staffUser').value;
  let p=document.getElementById('staffPass').value;
  if(u==='LeeTrainer' && p==='Z13X17'){
    document.getElementById('staffHub').innerHTML=`
    <h3>Luminar Staff Hub</h3>
    <p>Access Granted: Director Channel Open</p>
    <button onclick="alert('Director Logs Unlocked')">Director Logs</button>
    `;
  } else {
    document.getElementById('staffHub').innerHTML="ACCESS DENIED";
  }
}

// CLOCK
function clock(){
  let d=new Date();
  document.getElementById('clock').innerText=d.toLocaleTimeString();
}

function startMenu(){ alert('Start Menu Placeholder'); }
</script>

</body>
</html>
