<!DOCTYPE html>
<html>
<head>
<title>PROTOCOL Z v3.4</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#007070;
  font-family:"MS Sans Serif", Tahoma;
}

/* SCREENS */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:monospace;
}

#boot1,#boot2{
  background:black;
  color:lime;
}

#login{ display:none; background:#007070; }

/* DESKTOP */
#desktop{ display:none; width:100%; height:100%; }

/* ICONS */
.icon{
  position:absolute;
  width:110px;
  text-align:center;
  cursor:pointer;
}

.icon .emoji{ font-size:30px; }
.icon span{ display:block; font-size:12px; }

.tapes{top:80px;left:40px;}
.files{top:160px;left:40px;}
.aol{top:240px;left:40px;}
.staff{top:320px;left:40px;}
.notes{top:400px;left:40px;}
.cams{top:480px;left:40px;}
.brief{top:560px;left:40px;}
.youtube{top:640px;left:40px;}

/* WINDOWS */
.window{
  width:450px;
  height:320px;
  background:#c0c0c0;
  border:2px solid black;
  position:absolute;
  display:none;
}

.bar{
  background:#000080;
  color:white;
  padding:4px;
}

.close{
  float:right;
  background:red;
  padding:2px 6px;
  cursor:pointer;
}

.content{ padding:10px; font-size:12px; }

/* TASKBAR */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:28px;
  background:#c0c0c0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-top:2px solid white;
}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot1" class="screen">LUMINAR BIOS CHECK... OK</div>

<div id="login" class="screen">
<div>
<input id="user" placeholder="User"><br>
<input id="pass" type="password" placeholder="Pass"><br>
<button onclick="login()">ENTER</button>
<p id="msg"></p>
</div>
</div>

<div id="boot2" class="screen" style="display:none;">VERIFYING SYSTEM...</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon youtube" onclick="openW('yt')"><div class="emoji">▶</div><span>YouTube</span></div>
<div class="icon cams" onclick="openW('cams')"><div class="emoji">📹</div><span>Cameras</span></div>
<div class="icon aol" onclick="openW('aol')"><div class="emoji">💬</div><span>AOL</span></div>
<div class="icon staff" onclick="openW('staff')"><div class="emoji">🧪</div><span>Staff</span></div>

<!-- YOUTUBE -->
<div id="yt" class="window">
<div class="bar">YouTube Loader <span class="close" onclick="closeW('yt')">X</span></div>
<div class="content">
<input id="yturl" placeholder="Paste YouTube URL">
<button onclick="loadYT()">Load</button>
<div id="ytframe"></div>
</div>
</div>

<!-- CAMERAS -->
<div id="cams" class="window">
<div class="bar">Camera Feed <span class="close" onclick="closeW('cams')">X</span></div>
<div class="content">
<input id="camurl" placeholder="Feed URL">
<button onclick="loadCam()">Connect</button>
<div id="camview"></div>
</div>
</div>

<!-- AOL -->
<div id="aol" class="window">
<div class="bar">AOL 1997 <span class="close" onclick="closeW('aol')">X</span></div>
<div class="content">

<button onclick="setTab('chat')">Chat</button>
<button onclick="setTab('mail')">Mail</button>
<button onclick="setTab('news')">News</button>

<div id="chat">
<div id="chatlog" style="height:120px;overflow:auto;border:1px solid black;"></div>
<input id="chatInput"><button onclick="sendChat()">Send</button>
</div>

<div id="mail" style="display:none;">You’ve Got Mail: 0</div>
<div id="news" style="display:none;">Luminar instability rising...</div>

</div>
</div>

<!-- STAFF -->
<div id="staff" class="window">
<div class="bar">Staff <span class="close" onclick="closeW('staff')">X</span></div>
<div class="content">

<div id="staffLogin">
<input id="suser" placeholder="User">
<input id="spass" placeholder="Pass">
<button onclick="staffLogin()">Login</button>
</div>

<div id="labHome" style="display:none;">
<button onclick="deny()">Z-13 Wing</button><br>
<button onclick="openDirector()">Director Terminal</button>
</div>

</div>
</div>

<!-- DIRECTOR TERMINAL -->
<div id="director" class="window">
<div class="bar">Director Mode <span class="close" onclick="closeW('director')">X</span></div>
<div class="content">
<input id="code" placeholder="Enter Keycode">
<button onclick="unlockDirector()">Unlock</button>
<div id="dirContent"></div>
</div>
</div>

</div>

<!-- TASKBAR -->
<div class="taskbar">
<div>
<button onclick="openW('director')">Director</button>
<button onclick="alert('Settings')">⚙</button>
<button onclick="alert('Volume')">🔊</button>
</div>
<div>
<span id="weather">🌤 72°F</span> |
<span id="clock"></span>
</div>
</div>

<script>

/* BOOT */
setTimeout(()=>{
boot1.style.display="none";
login.style.display="flex";
},1500);

/* LOGIN */
function login(){
if(user.value==="LTrainer_87" && pass.value==="Z13X17"){
login.style.display="none";
boot2.style.display="flex";
setTimeout(()=>{
boot2.style.display="none";
desktop.style.display="block";
},1500);
}else msg.innerText="DENIED";
}

/* WINDOWS */
function openW(id){ document.getElementById(id).style.display="block"; }
function closeW(id){ document.getElementById(id).style.display="none"; }

/* YOUTUBE */
function loadYT(){
let url=document.getElementById("yturl").value;
ytframe.innerHTML='<iframe width="400" height="200" src="'+url.replace("watch?v=","embed/")+'"></iframe>';
}

/* CAMERA */
function loadCam(){
let url=document.getElementById("camurl").value;
camview.innerHTML='<iframe width="400" height="200" src="'+url+'"></iframe>';
}

/* AOL */
function setTab(t){
chat.style.display="none";
mail.style.display="none";
news.style.display="none";
document.getElementById(t).style.display="block";
}

/* AI CHAT */
function sendChat(){
let input=chatInput.value.toLowerCase();
chatlog.innerHTML+="<div>You: "+input+"</div>";

let response="...";

if(input.includes("z13")) response="Kane: It's unstable.";
if(input.includes("octogal")) response="Octogal: I see everything.";
if(input.includes("lab")) response="Kane: Access is restricted.";

chatlog.innerHTML+="<div>"+response+"</div>";
chatInput.value="";
}

/* STAFF */
function staffLogin(){
if(suser.value==="LeeTrainer" && spass.value==="Z13X17"){
staffLogin.style.display="none";
labHome.style.display="block";
}
}

/* DIRECTOR */
function openDirector(){ openW("director"); }

function unlockDirector(){
if(code.value==="VOSSE13"){
dirContent.innerHTML="Dr. Vosse Serum: Subject mutation successful.";
}else dirContent.innerHTML="ACCESS DENIED";
}

function deny(){ alert("ACCESS DENIED"); }

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
